<style>
    /* CSS KILLER: Remove widgets duplicados ou velhos do Footer */
    .whatsapp-container, .whatsapp-float, a[href*="wa.me"].fixed { display: none !important; }
    #back-to-top, .back-to-top { bottom: 110px !important; right: 24px !important; z-index: 90 !important; }

    /* Efeito de radar (Onda verde pulsando da imagem) */
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }
    .animate-pulse-ring { animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }

    #xtl-chat-window { transform-origin: bottom right; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    #xtl-chat-window.active { transform: scale(1); opacity: 1; pointer-events: all; }
    
    .chat-bubble-user { background: linear-gradient(135deg, #25D366, #128C7E); color: white; margin-left: auto; border-radius: 1rem 1rem 0 1rem; padding: 0.6rem 1rem; max-width: 85%; font-size: 0.85rem; box-shadow: 0 4px 6px -1px rgba(37,211,102, 0.2); margin-bottom: 8px;}
    .chat-bubble-bot { background-color: #1f2937; color: #e5e7eb; margin-right: auto; border-radius: 1rem 1rem 1rem 0; padding: 0.6rem 1rem; max-width: 85%; border: 1px solid #374151; font-size: 0.85rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); line-height: 1.5; margin-bottom: 8px; }

    .typing-indicator span { animation: blink 1.4s infinite both; height: 5px; width: 5px; background: #9ca3af; border-radius: 50%; display: inline-block; margin: 0 2px; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    #xtl-chat-body::-webkit-scrollbar { width: 4px; }
    #xtl-chat-body::-webkit-scrollbar-thumb { background-color: #374151; border-radius: 10px; }
</style>

<div id="xtl-chat-widget" class="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
    
    <div id="xtl-chat-window" class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl w-[340px] mb-4 overflow-hidden scale-0 opacity-0 pointer-events-none flex flex-col">
        <div class="bg-gradient-to-r from-gray-800 to-gray-900 p-4 border-b border-gray-700 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-10 h-10 bg-gray-950 rounded-full flex items-center justify-center p-1 border border-gray-700"><img src="img/logo.png" alt="XTL" class="w-full h-full object-contain"></div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-gray-800 rounded-full"></div>
                </div>
                <div><h4 class="text-white font-bold text-sm leading-tight">Suporte XTL</h4><p class="text-green-400 text-[10px] font-bold uppercase tracking-wider mt-0.5">Online Agora</p></div>
            </div>
            <button onclick="window.chatPro.close()" class="text-gray-400 hover:text-white p-1 transition-colors"><i class="fas fa-times"></i></button>
        </div>

        <div id="xtl-chat-body" class="p-4 bg-[#0b101a] h-[320px] overflow-y-auto flex flex-col relative pb-16"></div>

        <div id="xtl-transfer-area" class="hidden absolute bottom-[60px] left-0 right-0 p-3 bg-gradient-to-t from-[#0b101a] to-transparent shrink-0">
            <button onclick="window.chatPro.sendToWhatsApp()" class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold py-2.5 px-4 rounded-xl text-sm shadow-lg flex items-center justify-center gap-2 transition-transform transform hover:scale-[1.02]">
                <i class="fab fa-whatsapp text-lg"></i> Falar com um Especialista
            </button>
        </div>

        <div class="p-3 bg-gray-900 border-t border-gray-700 flex items-center gap-2 shrink-0 z-10">
            <input type="text" id="xtl-chat-input" placeholder="Digite sua mensagem..." class="flex-1 bg-gray-800 text-white text-sm border border-gray-700 rounded-xl px-4 py-2.5 outline-none focus:border-green-500 transition-colors">
            <button id="xtl-chat-send" class="w-10 h-10 bg-orange-500 hover:bg-orange-600 text-white rounded-xl flex items-center justify-center transition-colors shadow-lg shrink-0"><i class="fas fa-paper-plane text-sm"></i></button>
        </div>
    </div>

    <div class="flex items-center gap-4 relative">
        <div id="xtl-chat-tooltip" class="bg-[#0f172a] text-white text-sm font-bold py-2 px-4 rounded-xl shadow-lg border border-gray-800 relative transition-opacity duration-300">
            Fale pelo WhatsApp!
            <div class="absolute top-1/2 -right-1.5 -translate-y-1/2 w-3 h-3 bg-[#0f172a] border-r border-t border-gray-800 rotate-45"></div>
        </div>

        <div class="relative flex items-center justify-center cursor-pointer" onclick="window.chatPro.toggle()">
            <div id="xtl-chat-pulse" class="absolute inset-0 bg-[#25D366] rounded-full animate-pulse-ring"></div>
            <button id="xtl-chat-btn" class="w-[60px] h-[60px] bg-[#25D366] text-white rounded-full shadow-[0_8px_25px_rgba(37,211,102,0.4)] hover:scale-105 transition-transform relative z-10 flex items-center justify-center">
                <i class="fab fa-whatsapp text-3xl" id="xtl-chat-icon"></i>
            </button>
        </div>
    </div>
</div>

<script>
    class EmpatheticBot {
        constructor() {
            this.isOpen = false;
            this.step = 0; 
            this.lead = { detalhes: '', servico_deduzido: '', nome: '', local: '' };
            this.dic = [
                { id: 'Manutenção', keys: ['quebrou', 'liga', 'lento', 'tela', 'formatar', 'virus', 'teclado', 'bateria', 'pc', 'notebook', 'conserto'] },
                { id: 'Automação', keys: ['alexa', 'luz', 'smart', 'inteligente', 'cortina', 'camera', 'segurança', 'automação'] },
                { id: 'Desenvolvimento Web', keys: ['site', 'loja', 'sistema', 'web', 'aplicativo', 'app'] }
            ];
            this.init();
        }

        init() {
            setTimeout(() => this.appendBot('Olá! 👋 Como posso ajudar você hoje? Pode explicar resumidamente o que precisa.'), 1000);
            document.getElementById('xtl-chat-send').addEventListener('click', () => this.handleInput());
            document.getElementById('xtl-chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') this.handleInput(); });
        }

        toggle() { this.isOpen ? this.close() : this.open(); }

        open() {
            document.getElementById('xtl-chat-window').classList.add('active');
            document.getElementById('xtl-chat-icon').className = 'fas fa-times text-2xl';
            document.getElementById('xtl-chat-pulse').classList.add('hidden');
            document.getElementById('xtl-chat-tooltip').classList.add('opacity-0');
            this.isOpen = true;
            setTimeout(() => document.getElementById('xtl-chat-input').focus(), 100);
        }

        close() {
            document.getElementById('xtl-chat-window').classList.remove('active');
            document.getElementById('xtl-chat-icon').className = 'fab fa-whatsapp text-3xl';
            document.getElementById('xtl-chat-pulse').classList.remove('hidden');
            document.getElementById('xtl-chat-tooltip').classList.remove('opacity-0');
            this.isOpen = false;
        }

        appendUser(text) {
            const body = document.getElementById('xtl-chat-body');
            body.innerHTML += `<div class="chat-bubble-user">${text}</div>`;
            body.scrollTop = body.scrollHeight;
        }

        appendBot(text) {
            const body = document.getElementById('xtl-chat-body');
            const typId = 'typing-' + Date.now();
            body.innerHTML += `<div id="${typId}" class="flex items-start gap-2 w-full"><div class="w-7 h-7 bg-gray-800 rounded-full border border-gray-700 flex items-center justify-center text-orange-500 text-[10px] shrink-0"><i class="fas fa-robot"></i></div><div class="chat-bubble-bot typing-indicator"><span></span><span></span><span></span></div></div>`;
            body.scrollTop = body.scrollHeight;

            setTimeout(() => {
                document.getElementById(typId)?.remove();
                body.innerHTML += `<div class="flex items-start gap-2 w-full"><div class="w-7 h-7 bg-gray-800 rounded-full border border-gray-700 flex items-center justify-center text-orange-500 text-[10px] shrink-0"><i class="fas fa-robot"></i></div><div class="chat-bubble-bot">${text}</div></div>`;
                body.scrollTop = body.scrollHeight;
            }, 800 + Math.random() * 600);
        }

        guessService(text) {
            const lower = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            for (let cat of this.dic) { if (cat.keys.some(w => lower.includes(w))) return cat.id; }
            return 'Atendimento Geral';
        }

        handleInput() {
            const input = document.getElementById('xtl-chat-input');
            const msg = input.value.trim();
            if(!msg) return;

            this.appendUser(msg);
            input.value = '';
            document.getElementById('xtl-transfer-area').classList.remove('hidden');

            if (this.step === 0) {
                this.lead.detalhes = msg;
                this.lead.servico_deduzido = this.guessService(msg);
                this.appendBot(`Entendi! Parece ser sobre <strong>${this.lead.servico_deduzido}</strong>. Vou te conectar a um especialista.`);
                setTimeout(() => this.appendBot('Para eu anunciar você lá, <strong>como se chama?</strong> (Ou clique no botão verde para pular)'), 1500);
                this.step = 1;
            } else if (this.step === 1) {
                this.lead.nome = msg.split(' ')[0];
                this.appendBot(`Muito prazer, ${this.lead.nome}! Última pergunta: de qual <strong>bairro/cidade</strong> você fala?`);
                this.step = 2;
            } else if (this.step === 2) {
                this.lead.local = msg;
                this.appendBot('Tudo anotado! ✅ Clique no botão verde abaixo para iniciarmos o atendimento no WhatsApp.');
                input.disabled = true;
                input.placeholder = "Atendimento concluído.";
                this.step = 3;
            }
        }

        sendToWhatsApp() {
            let textoWpp = `*NOVO ATENDIMENTO VIA SITE* 🚀%0A----------------------------%0A`;
            if (this.lead.nome) textoWpp += `👤 *Nome:* ${this.lead.nome}%0A`;
            if (this.lead.local) textoWpp += `📍 *Local:* ${this.lead.local}%0A`;
            if (this.lead.servico_deduzido) textoWpp += `⚙️ *Categoria:* ${this.lead.servico_deduzido}%0A`;
            textoWpp += `%0A📝 *Mensagem do Cliente:*%0A"${this.lead.detalhes}"%0A`;
            
            window.open(`https://wa.me/5521984197719?text=${textoWpp}`, '_blank');
            this.close();
        }
    }
    window.chatPro = new EmpatheticBot();
</script>
