<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio de Projetos - Xerfan Tech Lab</title>
    
    <meta name="description" content="Explore o portfólio da Xerfan Tech Lab: projetos de automação, desenvolvimento web e infraestrutura de TI realizados com excelência.">
    <meta name="keywords" content="portfólio TI, projetos automação, cases de sucesso web, clientes Xerfan, projetos infraestrutura">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Portfólio de Projetos - Xerfan Tech Lab">
    <meta property="og:description" content="Conheça alguns dos projetos que realizamos com excelência, dedicação e inovação tecnológica.">
    <meta property="og:image" content="img/logo.png">
    <meta property="og:site_name" content="Xerfan Tech Lab">

    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/enhancements.css">
    <link rel="icon" type="image/x-icon" href="img/logo.png">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif; }
        .portfolio-card .overlay-details { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }
        .portfolio-card:hover .overlay-details { transform: translateY(0); }
        .portfolio-card img { transition: transform 0.5s ease; }
        .portfolio-card:hover img { transform: scale(1.08); }
    </style>
</head>
<body class="bg-gray-950 transition-colors duration-300">

    <div class="hidden from-blue-600 to-blue-800 from-purple-600 to-indigo-800 from-cyan-600 to-blue-800 from-red-600 to-rose-800 from-orange-500 to-orange-700"></div>

    <div id="header"></div>

    <section class="relative py-20 lg:py-24 bg-gradient-to-br from-gray-950 via-blue-950/20 to-gray-950 border-b border-gray-800 overflow-hidden">
        <div class="absolute inset-0 pointer-events-none">
            <div class="absolute top-0 left-1/4 w-64 h-64 bg-orange-500/10 rounded-full blur-[80px]"></div>
            <div class="absolute bottom-0 right-1/4 w-80 h-80 bg-blue-500/10 rounded-full blur-[80px]"></div>
        </div>
        
        <div class="container mx-auto px-4 relative z-10 text-center" data-aos="fade-up">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-orange-400 text-xs sm:text-sm font-bold tracking-wide uppercase mb-6 shadow-lg backdrop-blur-sm">
                <i class="fas fa-briefcase"></i> Nossos Trabalhos
            </div>
            
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-black text-white tracking-tight mb-5">
                Portfólio de <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-orange-600">Projetos</span>
            </h1>
            
            <p class="text-base md:text-lg text-gray-400 max-w-2xl mx-auto leading-relaxed">
                Conheça alguns dos projetos que realizamos com excelência, dedicação e inovação tecnológica.
            </p>
        </div>
    </section>

    <section class="py-8 bg-gray-900 border-b border-gray-800 sticky top-[70px] z-20 shadow-sm">
        <div class="container mx-auto px-4">
            <div class="filter-tabs justify-center" id="portfolio-filters">
                <button class="filter-tab active" data-pf="all">Todos</button>
                <button class="filter-tab" data-pf="Desenvolvimento Web">🌐 Web</button>
                <button class="filter-tab" data-pf="Automação Residencial">🤖 Automação</button>
                <button class="filter-tab" data-pf="Infraestrutura e Redes">🖧 Infraestrutura</button>
                <button class="filter-tab" data-pf="Projetos AutoCAD / Elétrica">📐 Projetos</button>
            </div>
        </div>
    </section>

    <section class="py-20 bg-gray-950">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-7" id="portfolio-grid">
                <div class="bg-gray-800/50 rounded-3xl h-[300px] animate-pulse border border-gray-700/30"></div>
                <div class="bg-gray-800/50 rounded-3xl h-[300px] animate-pulse border border-gray-700/30 hidden md:block"></div>
                <div class="bg-gray-800/50 rounded-3xl h-[300px] animate-pulse border border-gray-700/30 hidden lg:block"></div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>

    <script type="module">
        // Importação centralizada do Firebase
        import { db } from "./js/firebase-config.js";
        import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Mapas visuais para ícones e cores de gradiente consoante a categoria
        const icons = {
            "Desenvolvimento Web": 'fas fa-code', 
            "Automação Residencial": 'fas fa-robot', 
            "Infraestrutura e Redes": 'fas fa-server', 
            "Projetos AutoCAD / Elétrica": 'fas fa-drafting-compass'
        };

        const gradients = {
            "Desenvolvimento Web": 'from-blue-600 to-blue-800', 
            "Automação Residencial": 'from-purple-600 to-indigo-800',
            "Infraestrutura e Redes": 'from-cyan-600 to-blue-800', 
            "Projetos AutoCAD / Elétrica": 'from-orange-500 to-orange-700'
        };

        async function initPortfolio() {
            try {
                if(typeof loadComponent === 'function') {
                    await Promise.all([
                        loadComponent('header', 'components/header.html'),
                        loadComponent('footer', 'components/footer.html')
                    ]);
                }
                AOS.init({ duration: 750, once: true, offset: 80 });
            } catch(e) { console.error("Erro components:", e); }

            const portfolioGrid = document.getElementById('portfolio-grid');
            const q = query(collection(db, "portfolio"), orderBy("data_cadastro", "desc"));

            onSnapshot(q, (snapshot) => {
                portfolioGrid.innerHTML = '';
                if (snapshot.empty) {
                    portfolioGrid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-20">Nenhum projeto cadastrado.</p>';
                    return;
                }

                snapshot.forEach((docSnap, index) => {
                    const p = docSnap.data();
                    const id = docSnap.id;
                    const cat = p.categoria;
                    const icone = icons[cat] || 'fas fa-briefcase';
                    const gradiente = gradients[cat] || 'from-gray-600 to-gray-800';
                    const dataAno = p.data_conclusao ? p.data_conclusao.split('-')[0] : new Date().getFullYear();

                    const cardHTML = `
                        <div class="portfolio-card card bg-gray-800 border-gray-700 card-body-no-padding rounded-2xl overflow-hidden group cursor-pointer shadow-lg hover:shadow-orange-500/20" 
                             data-pf="${cat}" 
                             data-aos="fade-up" 
                             data-aos-delay="${index * 50}"
                             onclick="window.location.href='projeto.html?id=${id}'">
                            
                            <div class="relative overflow-hidden h-52 border-b border-gray-700 bg-gray-900">
                                <img src="${p.imagem}" loading="lazy" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-40" alt="${p.titulo}">
                                <div class="absolute inset-0 bg-gradient-to-br ${gradiente} opacity-20 group-hover:opacity-40 transition-opacity"></div>
                                <div class="absolute inset-0 flex flex-col items-center justify-center p-6 backdrop-blur-[2px]">
                                    <i class="${icone} text-4xl mb-3 text-white opacity-90 drop-shadow-md group-hover:scale-110 transition-transform"></i>
                                    <p class="font-bold text-center text-white tracking-wide drop-shadow-lg">${p.titulo}</p>
                                </div>
                                <div class="overlay-details absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/95 to-transparent p-5 flex flex-col justify-end">
                                    <p class="text-gray-200 text-xs leading-relaxed line-clamp-3">${p.descricao}</p>
                                    <div class="flex gap-2 mt-3">
                                        <span class="bg-white/10 border border-white/10 text-white text-[10px] px-2 py-0.5 rounded-full">${p.cliente}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="card-content-padding p-5">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="badge ${cat.includes('Web') ? 'badge-blue' : 'badge-orange'} text-[10px]">${cat}</span>
                                    <span class="text-[10px] text-gray-500 font-medium">${dataAno}</span>
                                </div>
                                <h3 class="font-bold text-white mb-1 text-sm line-clamp-1">${p.titulo}</h3>
                                <p class="text-gray-400 text-[11px] line-clamp-1">${p.cliente}</p>
                                <div class="flex items-center justify-between mt-4 pt-3 border-t border-gray-700">
                                    <div class="flex items-center gap-1 text-yellow-500 text-[10px]">★★★★★</div>
                                    <span class="text-orange-500 hover:text-orange-400 text-[10px] font-bold uppercase tracking-wider flex items-center gap-2">
                                        Ver Detalhes <i class="fas fa-arrow-right"></i>
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
                    portfolioGrid.insertAdjacentHTML('beforeend', cardHTML);
                });
            });
        }

        // Lógica dos Botões de Filtro
        document.getElementById('portfolio-filters')?.addEventListener('click', e => {
            const tab = e.target.closest('.filter-tab');
            if (!tab) return;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const filter = tab.dataset.pf;
            document.querySelectorAll('#portfolio-grid > div[data-pf]').forEach(card => {
                card.style.display = (filter === 'all' || card.dataset.pf === filter) ? '' : 'none';
            });
        });

        window.addEventListener('load', initPortfolio);
    </script>
</body>
</html>
